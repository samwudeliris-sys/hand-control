<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
/>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Blind Monkey" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<title>Blind Monkey</title>
<style>
  :root {
    --bg: #000;
    --panel: #0f0f0f;
    --panel-2: #141414;
    --fg: #fff;
    --muted: #7f7f7f;
    --muted-2: #3b3b3b;
    --accent: #ff5b2e;
    --accent-soft: rgba(255, 91, 46, 0.2);
    --accent-glow: rgba(255, 91, 46, 0.55);
    --accent-bg: #1c0d08;
    --green: #1ec67a;
    --green-dim: #103a26;
    --red: #de5a38;
    --red-dim: #411910;
    --radius: 24px;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    touch-action: manipulation;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  button,
  textarea {
    font: inherit;
  }

  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: max(12px, env(safe-area-inset-top))
             max(14px, env(safe-area-inset-right))
             10px
             max(14px, env(safe-area-inset-left));
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    transition: background 0.25s;
  }

  .dot.ok { background: var(--green); }
  .dot.bad { background: var(--red); }
  .dot.wait { background: #c9a227; }

  .onboarding-strip {
    flex: 0 0 auto;
    display: none;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 max(14px, env(safe-area-inset-right)) 8px max(14px, env(safe-area-inset-left));
  }
  .onboarding-strip.show { display: flex; }
  .onboarding-strip span.ok { color: var(--green); }
  .onboarding-strip span.bad { color: var(--red); }
  .onboarding-strip span.muted { color: #555; }

  .app {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
    gap: 12px;
    padding:
      0 max(14px, env(safe-area-inset-right))
      max(14px, env(safe-area-inset-bottom))
      max(14px, env(safe-area-inset-left));
  }

  .panel {
    min-height: 0;
    background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
    border: 1px solid #1d1d1d;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }

  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top center, rgba(255, 255, 255, 0.035), transparent 50%);
    pointer-events: none;
  }

  .listen-panel {
    display: flex;
    flex-direction: column;
    padding: 14px;
    min-height: 0;
  }

  .deck {
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  .track {
    display: flex;
    height: 100%;
    align-items: stretch;
    transition: transform 380ms cubic-bezier(0.22, 0.9, 0.28, 1);
    will-change: transform;
  }

  .track.dragging {
    transition: none;
  }

  .card {
    flex: 0 0 auto;
    height: 100%;
    margin: 0 6px;
    padding: 16px 18px 14px;
    background: linear-gradient(180deg, #151515 0%, #101010 100%);
    border: 1px solid #202020;
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: relative;
    overflow: hidden;
    opacity: 0.45;
    transform: scale(0.92);
    transition:
      background 0.25s,
      border-color 0.25s,
      opacity 0.3s cubic-bezier(0.22, 0.9, 0.28, 1),
      transform 0.3s cubic-bezier(0.22, 0.9, 0.28, 1);
  }

  .card.active {
    opacity: 1;
    transform: scale(1);
  }

  .card.switch-flash {
    border-color: rgba(255, 91, 46, 0.55);
    box-shadow: 0 0 0 1px rgba(255, 91, 46, 0.14), inset 0 0 34px -18px rgba(255, 91, 46, 0.38);
    animation: switch-flash 260ms ease-out;
  }

  .card.empty {
    border-style: dashed;
    border-color: #2b2b2b;
    justify-content: center;
    gap: 10px;
  }

  .host-badge {
    align-self: flex-end;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 48px;
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(255, 91, 46, 0.08);
    border: 1px solid var(--accent-soft);
  }

  .host-badge[data-host="pc"] {
    color: var(--green);
    border-color: rgba(30, 198, 122, 0.35);
    background: rgba(30, 198, 122, 0.08);
  }

  body[data-has-peer="0"] .host-badge {
    display: none;
  }

  .card-project {
    width: 100%;
    text-align: center;
    font-size: clamp(19px, 3vw, 26px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-center {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .card-status {
    font-size: clamp(24px, 4vw, 34px);
    font-weight: 800;
    letter-spacing: -0.03em;
    text-align: center;
  }

  .transcribe-bars {
    display: none;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    height: 28px;
  }

  .transcribe-bars span {
    display: block;
    width: 6px;
    height: 10px;
    border-radius: 999px;
    background: rgba(255, 91, 46, 0.9);
    box-shadow: 0 0 12px rgba(255, 91, 46, 0.2);
    transform-origin: center bottom;
    animation: transcribe-bars 0.95s ease-in-out infinite;
  }

  .transcribe-bars span:nth-child(2) { animation-delay: 0.08s; }
  .transcribe-bars span:nth-child(3) { animation-delay: 0.16s; }
  .transcribe-bars span:nth-child(4) { animation-delay: 0.24s; }

  .card.waiting .transcribe-bars {
    display: flex;
  }

  .card.holding {
    border-color: var(--accent);
    background: linear-gradient(180deg, #221008 0%, #180c07 100%);
    box-shadow: inset 0 0 60px -12px var(--accent-glow);
  }

  .card.waiting {
    border-color: var(--accent-soft);
    background: linear-gradient(180deg, #19110e 0%, #14100d 100%);
  }

  .card.sent .card-status {
    opacity: 0.45;
  }

  .card.empty .card-project,
  .card.empty .card-status {
    color: #8b8b8b;
  }

  .hold-ring {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.08);
    background: radial-gradient(circle, rgba(255, 255, 255, 0.07) 0%, transparent 68%);
    position: relative;
  }

  .hold-ring::before,
  .hold-ring::after {
    content: "";
    position: absolute;
    inset: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
  }

  .hold-ring::before {
    width: 42px;
    height: 42px;
    background: #4a4a4a;
    transition: background 0.18s, box-shadow 0.18s, transform 0.18s;
  }

  .card.holding .hold-ring::before {
    background: var(--accent);
    box-shadow: 0 0 28px 2px var(--accent-glow);
    transform: translate(-50%, -50%) scale(1.12);
  }

  .card.waiting .hold-ring::before {
    background: var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }

  .meter {
    width: min(300px, 78%);
    height: 7px;
    border-radius: 999px;
    background: rgba(255, 91, 46, 0.12);
    overflow: hidden;
  }

  .meter-fill {
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: var(--accent);
    transition: width 60ms linear;
  }

  .review {
    flex: 1 1 auto;
    min-height: 0;
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
    border-radius: 18px;
    border: 1px solid #272727;
    background: linear-gradient(180deg, rgba(20, 20, 20, 0.98) 0%, rgba(10, 10, 10, 0.98) 100%);
  }

  .review.active { display: flex; }

  .review-text {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    border: 1px solid #282828;
    border-radius: 18px;
    background: #090909;
    color: var(--fg);
    padding: 14px 16px;
    font-size: 17px;
    line-height: 1.4;
    resize: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: auto;
    caret-color: var(--fg);
  }

  .review-text:focus {
    border-color: var(--accent-soft);
  }

  .review.error .review-text {
    color: #ffd0c3;
    border-color: rgba(222, 90, 56, 0.45);
    background: rgba(222, 90, 56, 0.08);
  }

  .review-actions {
    display: flex;
    gap: 10px;
  }

  .action-btn {
    flex: 1;
    border: none;
    border-radius: 16px;
    padding: 14px 16px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.16s, opacity 0.16s, background 0.16s, color 0.16s;
  }

  .action-btn:active {
    transform: scale(0.985);
  }

  .action-delete {
    background: var(--red-dim);
    color: var(--red);
  }

  .action-submit {
    background: var(--green-dim);
    color: var(--green);
  }

  .action-submit:disabled {
    opacity: 0.4;
    cursor: default;
  }

  .review {
    position: absolute;
    inset: 0;
    margin: 14px;
    z-index: 3;
  }

  .sent-pill {
    display: none;
    position: absolute;
    right: 16px;
    top: 16px;
    align-items: center;
    justify-content: center;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--green);
    background: rgba(13, 64, 39, 0.92);
    color: var(--green);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 4;
  }

  .sent-pill.show { display: flex; }

  .record-cancel {
    position: absolute;
    right: 18px;
    top: 50%;
    width: 42px;
    height: 42px;
    border: 1px solid rgba(222, 90, 56, 0.45);
    border-radius: 50%;
    background: rgba(222, 90, 56, 0.16);
    color: var(--red);
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    transform: translateY(-50%) scale(0.92);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.16s, transform 0.16s, background 0.16s;
    z-index: 2;
  }

  .card.holding .record-cancel {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(-50%) scale(1);
  }

  .record-cancel:active {
    background: rgba(222, 90, 56, 0.28);
    transform: translateY(-50%) scale(0.96);
  }

  .trackpad-panel {
    padding: 14px;
    display: flex;
    flex-direction: column;
  }

  .trackpad-head {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .trackpad-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .trackpad-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .trackpad {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
    border-radius: 20px;
    border: 1px solid #1f1f1f;
    background: radial-gradient(ellipse at center, #151515 0%, #0a0a0a 82%);
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .trackpad::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #1b1b1b 1px, transparent 1.5px);
    background-size: 28px 28px;
    background-position: center;
    opacity: 0.75;
    pointer-events: none;
  }

  .trackpad-guide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    color: #7f7f7f;
    pointer-events: none;
  }

  .trackpad-guide strong {
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9b9b9b;
  }

  .trackpad-guide span {
    font-size: 11px;
    line-height: 1.5;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5f5f5f;
  }

  .trackpad.active {
    border-color: var(--accent-soft);
  }

  .pad-host {
    position: absolute;
    top: 10px;
    right: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--accent-soft);
    background: rgba(0, 0, 0, 0.56);
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s;
    pointer-events: none;
  }

  .pad-host[data-host="pc"] {
    color: var(--green);
    border-color: rgba(30, 198, 122, 0.45);
  }

  .trackpad[data-peer="off"] .pad-host {
    display: none;
  }

  .pad-touch {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 91, 46, 0.2) 0%, transparent 72%);
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.6);
    top: var(--touch-y, 50%);
    left: var(--touch-x, 50%);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }

  .pad-touch.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  @keyframes transcribe-bars {
    0%, 100% {
      height: 10px;
      opacity: 0.45;
      transform: scaleY(0.65);
    }
    50% {
      height: 26px;
      opacity: 1;
      transform: scaleY(1);
    }
  }

  @keyframes switch-flash {
    0% {
      transform: scale(0.975);
      box-shadow: 0 0 0 0 rgba(255, 91, 46, 0.22), inset 0 0 50px -18px rgba(255, 91, 46, 0.55);
    }
    100% {
      transform: scale(1);
      box-shadow: 0 0 0 1px rgba(255, 91, 46, 0.14), inset 0 0 34px -18px rgba(255, 91, 46, 0.38);
    }
  }
</style>
</head>
<body data-has-peer="0">
  <header>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">connecting</span>
    </div>
  </header>
  <div class="onboarding-strip" id="onboardingStrip" aria-label="Setup checklist">
    <span class="muted" id="ckSignIn">Sign in</span>
    <span class="muted" id="ckRelay">Relay</span>
    <span class="muted" id="ckMac">Mac</span>
    <span class="muted" id="ckAccess">Access</span>
    <span class="muted" id="ckMic">Mic</span>
  </div>

  <main class="app">
    <section class="panel listen-panel" id="listenPanel">
      <div class="deck" id="deck">
        <div class="track" id="track"></div>

        <div class="review" id="reviewBox">
          <textarea
            id="reviewText"
            class="review-text"
            placeholder="Nothing captured. Type here or delete."
            autocapitalize="sentences"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <div class="review-actions">
            <button class="action-btn action-delete" id="btnDelete" type="button">Delete</button>
            <button class="action-btn action-submit" id="btnSubmit" type="button">Submit</button>
          </div>
        </div>

        <div class="sent-pill" id="sentPill">Submitted</div>
      </div>
    </section>

    <section class="panel trackpad-panel">
      <div class="trackpad-head">
        <div class="trackpad-title">Trackpad</div>
        <div class="trackpad-hint">Tap = left click<br>Two fingers = right click / scroll</div>
      </div>
      <div class="trackpad" id="trackpad" data-peer="off">
        <div class="pad-host" id="padHost" data-host="mac">MAC</div>
        <div class="trackpad-guide">
          <strong>Trackpad</strong>
          <span>Drag to move<br>Two-finger drag to scroll</span>
        </div>
        <div class="pad-touch" id="padTouch"></div>
      </div>
    </section>
  </main>

<script>
(() => {
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');

  const deckEl = document.getElementById('deck');
  const trackEl = document.getElementById('track');
  const reviewBoxEl = document.getElementById('reviewBox');
  const reviewTextEl = document.getElementById('reviewText');
  const btnDeleteEl = document.getElementById('btnDelete');
  const btnSubmitEl = document.getElementById('btnSubmit');
  const sentPillEl = document.getElementById('sentPill');

  const trackpadEl = document.getElementById('trackpad');
  const padHostEl = document.getElementById('padHost');
  const padTouchEl = document.getElementById('padTouch');

  let ws = null;
  let reconnectDelay = 500;
  let windows = [];
  let listWindowsError = null;
  let resyncTimer = null;
  let selected = -1;
  let wakeLock = null;

  let mode = 'idle'; // idle | holding | waiting | editing | error | sent
  let transcriptText = '';
  let errorText = '';
  let sentResetTimer = null;
  let sentToastVisible = false;
  let pendingTranscriptAction = 'send'; // send | edit
  let connectionMode = 'nearby';
  let macAccessTrusted = true;
  let accountRelayConfig = null;
  let supabaseClient = null;
  let relaySessionExpiresAt = 0;
  let sawMacState = false;
  let macWaitTimer = null;
  let micPermissionOk = null;
  let accountUserSignedIn = false;

  const onboardingStrip = document.getElementById('onboardingStrip');
  const ckSignIn = document.getElementById('ckSignIn');
  const ckRelay = document.getElementById('ckRelay');
  const ckMac = document.getElementById('ckMac');
  const ckAccess = document.getElementById('ckAccess');
  const ckMic = document.getElementById('ckMic');

  let cardWidth = 0;
  let cardStep = 0;
  let restOffset = 0;
  const CARD_MARGIN_PX = 6;
  let gesture = null;

  const HAPTIC = {
    TAP: 6,
    SOFT: 10,
    MEDIUM: 18,
    DONE: [8, 40, 14],
    ERR: [20, 60, 20],
  };

  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch {}
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      requestWakeLock();
      if (ws && ws.readyState === WebSocket.OPEN) {
        send({ type: 'request_state' });
      }
    }
  });
  requestWakeLock();

  function haptic(pattern) {
    if (!('vibrate' in navigator)) return;
    try { navigator.vibrate(pattern); } catch {}
  }

  function accountConfig() {
    const cfg = window.BLIND_MONKEY_CONFIG || {};
    if (!cfg.accountPairing || !cfg.supabaseUrl || !cfg.supabaseAnonKey || !cfg.relayUrl) {
      return null;
    }
    return cfg;
  }

  function relayHttpBase() {
    const fromSaved = accountRelayConfig && accountRelayConfig.relay;
    const fromAcct = (window.BLIND_MONKEY_CONFIG || {}).relayUrl;
    const r = fromSaved || fromAcct;
    if (!r) return null;
    return String(r)
      .replace(/\/+$/, '')
      .replace(/^wss/i, 'https')
      .replace(/^ws/i, 'http');
  }

  async function ensurePhoneRelayToken(supabaseAccessToken) {
    const now = Date.now() / 1000;
    if (
      accountRelayConfig
      && accountRelayConfig.relayToken
      && relaySessionExpiresAt > now + 90
    ) {
      return accountRelayConfig.relayToken;
    }
    const base = relayHttpBase();
    if (!base) return supabaseAccessToken;
    try {
      const r = await fetch(`${base}/v1/relay/sessions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${supabaseAccessToken}`,
        },
        body: JSON.stringify({ role: 'phone' }),
      });
      if (!r.ok) {
        return supabaseAccessToken;
      }
      const data = await r.json();
      if (data.access_token) {
        relaySessionExpiresAt = now + (data.expires_in || 3600);
        return data.access_token;
      }
    } catch {
      // fall back to Supabase access token
    }
    return supabaseAccessToken;
  }

  async function prepareAccountRelayForConnect() {
    if (!accountConfig() || !supabaseClient) return;
    const { data } = await supabaseClient.auth.getSession();
    const session = data && data.session;
    if (!session || !session.access_token) return;
    const tok = await ensurePhoneRelayToken(session.access_token);
    const cfg = accountConfig();
    accountRelayConfig = {
      relay: cfg.relayUrl,
      device: 'account',
      relayToken: tok,
      accessToken: session.access_token,
    };
  }

  function updateOnboardingChecklist() {
    const acct = accountConfig();
    if (!onboardingStrip) return;
    if (!acct) {
      onboardingStrip.classList.remove('show');
      return;
    }
    onboardingStrip.classList.add('show');
    if (ckSignIn) {
      const signed = accountUserSignedIn;
      ckSignIn.className = signed ? 'ok' : 'bad';
      ckSignIn.textContent = signed ? 'Sign in ✓' : 'Sign in';
    }
    if (ckRelay) {
      const ok = connectionMode === 'remote' && ws && ws.readyState === WebSocket.OPEN;
      ckRelay.className = ok ? 'ok' : 'bad';
      ckRelay.textContent = ok ? 'Relay ✓' : 'Relay';
    }
    if (ckMac) {
      const st = (statusText && statusText.textContent) || '';
      const sl = st.toLowerCase();
      const macOffline = sl.includes('mac offline');
      const waiting = sl.includes('waiting for mac');
      const ok = sawMacState && !macOffline;
      ckMac.className = ok ? 'ok' : macOffline ? 'bad' : 'muted';
      ckMac.textContent = ok ? 'Mac online ✓' : macOffline ? 'Mac offline' : waiting ? 'Mac…' : 'Mac';
    }
    if (ckAccess) {
      const ok = macAccessTrusted;
      ckAccess.className = ok ? 'ok' : 'bad';
      ckAccess.textContent = ok ? 'Mac access ✓' : 'Mac access';
    }
    if (ckMic) {
      if (micPermissionOk === true) {
        ckMic.className = 'ok';
        ckMic.textContent = 'Mic ✓';
      } else if (micPermissionOk === false) {
        ckMic.className = 'bad';
        ckMic.textContent = 'Mic blocked';
      } else {
        ckMic.className = 'muted';
        ckMic.textContent = 'Mic';
      }
    }
  }

  function ensureAuthOverlay() {
    let el = document.getElementById('authOverlay');
    if (el) return el;
    el = document.createElement('div');
    el.id = 'authOverlay';
    el.style.cssText = [
      'position:fixed',
      'inset:0',
      'z-index:1000',
      'display:grid',
      'place-items:center',
      'background:rgba(0,0,0,.86)',
      'padding:24px',
      'font-family:-apple-system,BlinkMacSystemFont,sans-serif',
    ].join(';');
    el.innerHTML = `
      <div style="width:min(420px,100%);border:1px solid rgba(255,255,255,.14);border-radius:28px;background:#101010;padding:24px;color:white;box-shadow:0 24px 80px rgba(0,0,0,.5)">
        <div style="font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#ff744d;font-weight:800;margin-bottom:10px">Blind Monkey</div>
        <div style="font-size:28px;font-weight:800;line-height:1.05;margin-bottom:10px">Sign in to connect</div>
        <div style="font-size:14px;line-height:1.45;color:#aaa;margin-bottom:18px">Use the same account on your Mac and iPhone. They will pair automatically.</div>
        <input id="authEmail" type="email" placeholder="you@example.com" autocomplete="email" style="box-sizing:border-box;width:100%;border:1px solid rgba(255,255,255,.16);border-radius:16px;background:#050505;color:white;font-size:16px;padding:14px 16px;margin-bottom:12px" />
        <button id="authButton" style="width:100%;border:0;border-radius:16px;background:#ff744d;color:#160704;font-size:16px;font-weight:800;padding:14px 16px">Email me a sign-in link</button>
        <div id="authMessage" style="min-height:20px;margin-top:12px;font-size:13px;color:#aaa"></div>
      </div>
    `;
    document.body.appendChild(el);
    return el;
  }

  async function initializeAccountRelay() {
    const cfg = accountConfig();
    if (!cfg) {
      accountUserSignedIn = false;
      return true;
    }
    if (relayConfig()) {
      accountUserSignedIn = !!accountConfig();
      return true;
    }
    if (!window.supabase || !window.supabase.createClient) {
      statusText.textContent = 'sign-in unavailable';
      return false;
    }

    supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data } = await supabaseClient.auth.getSession();
    const session = data && data.session;
    if (session && session.access_token) {
      accountUserSignedIn = true;
      const tok = await ensurePhoneRelayToken(session.access_token);
      accountRelayConfig = {
        relay: cfg.relayUrl,
        device: 'account',
        relayToken: tok,
        accessToken: session.access_token,
      };
      updateOnboardingChecklist();
      return true;
    }

    accountUserSignedIn = false;
    dot.className = 'dot bad';
    statusText.textContent = 'sign in';
    const overlay = ensureAuthOverlay();
    const email = overlay.querySelector('#authEmail');
    const button = overlay.querySelector('#authButton');
    const message = overlay.querySelector('#authMessage');
    button.addEventListener('click', async () => {
      const value = (email.value || '').trim();
      if (!value) {
        message.textContent = 'Enter your email first.';
        return;
      }
      button.disabled = true;
      message.textContent = 'Sending sign-in link...';
      const { error } = await supabaseClient.auth.signInWithOtp({
        email: value,
        options: { emailRedirectTo: location.href },
      });
      button.disabled = false;
      message.textContent = error ? error.message : 'Check your email, then come back here.';
    });
    supabaseClient.auth.onAuthStateChange(async (_event, nextSession) => {
      if (nextSession && nextSession.access_token) {
        accountUserSignedIn = true;
        const tok = await ensurePhoneRelayToken(nextSession.access_token);
        accountRelayConfig = {
          relay: cfg.relayUrl,
          device: 'account',
          relayToken: tok,
          accessToken: nextSession.access_token,
        };
        updateOnboardingChecklist();
        overlay.remove();
        connect();
      }
    });
    return false;
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  function sendBinary(buf) {
    if (ws && ws.readyState === WebSocket.OPEN && buf && buf.byteLength > 0) {
      ws.send(buf);
    }
  }

  function relayConfig() {
    if (accountRelayConfig) return accountRelayConfig;
    const params = new URLSearchParams(location.search);
    const relay = params.get('relay');
    const device = params.get('device');
    const token = params.get('token');
    if (relay && device && token) {
      const cfg = { relay, device, token };
      localStorage.setItem('blindRelayConfig', JSON.stringify(cfg));
      history.replaceState(null, '', location.pathname);
      return cfg;
    }
    if (params.get('clearRelay') === '1') {
      localStorage.removeItem('blindRelayConfig');
      history.replaceState(null, '', location.pathname);
      return null;
    }
    try {
      const saved = JSON.parse(localStorage.getItem('blindRelayConfig') || 'null');
      if (saved && saved.relay && saved.device && saved.token) return saved;
    } catch {}
    return null;
  }

  function wsURL() {
    const cfg = relayConfig();
    if (cfg) {
      connectionMode = 'remote';
      const base = String(cfg.relay).replace(/\/+$/, '');
      const device = encodeURIComponent(cfg.device);
      const token = cfg.relayToken || cfg.accessToken || cfg.token;
      if (token) {
        return `${base}/relay/phone/${device}?access_token=${encodeURIComponent(token)}`;
      }
    }
    connectionMode = 'nearby';
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${location.host}/ws`;
  }

  function selectedWindow() {
    if (selected < 0 || selected >= windows.length) return null;
    return windows[selected];
  }

  function normalizeSelection() {
    if (!windows.length) {
      selected = -1;
    } else if (selected < 0 || selected >= windows.length) {
      selected = 0;
    }
  }

  function activeCard() {
    return trackEl.querySelector('.card.active');
  }

  function flashSwitchCard(index = selected) {
    if (index < 0) return;
    const card = trackEl.querySelector(`.card:nth-child(${index + 1})`);
    if (!card || card.classList.contains('empty')) return;
    card.classList.remove('switch-flash');
    // Force restart if the user flicks through cards quickly.
    void card.offsetWidth;
    card.classList.add('switch-flash');
    setTimeout(() => {
      card.classList.remove('switch-flash');
    }, 280);
  }

  function setMode(next) {
    mode = next;

    if (next === 'idle' || next === 'editing' || next === 'error' || next === 'sent') {
      pendingTranscriptAction = 'send';
    }

    if (next === 'idle') {
      transcriptText = '';
      errorText = '';
      reviewTextEl.value = '';
      delete reviewTextEl.dataset.touched;
    }

    renderListenPanel();
  }

  function showSubmittedToast() {
    sentToastVisible = true;
    renderListenPanel();
    if (sentResetTimer) clearTimeout(sentResetTimer);
    sentResetTimer = setTimeout(() => {
      sentToastVisible = false;
      sentResetTimer = null;
      renderListenPanel();
    }, 1200);
  }

  function safeReset() {
    try { if (mediaRecorder) mediaRecorder.stop(); } catch {}
    mediaRecorder = null;
    recordedChunks = [];
    if (gesture && gesture.holdTimer) clearTimeout(gesture.holdTimer);
    gesture = null;
    stopMeter();
    releaseMicStream();
    cancelPadGesture();
    setMode('idle');
  }

  function buildCards() {
    trackEl.innerHTML = '';

    if (!windows.length) {
      const c = document.createElement('div');
      c.className = 'card empty active';
      const title = macAccessTrusted ? 'No Cursor windows' : 'Mac access needed';
      let line = macAccessTrusted ? 'Open Cursor' : 'Enable access on Mac';
      if (macAccessTrusted && listWindowsError) {
        line = listWindowsError.length > 220 ? listWindowsError.slice(0, 220) + '…' : listWindowsError;
      }
      c.innerHTML = `
        <div class="card-project"></div>
        <div class="card-center">
          <div class="hold-ring"></div>
          <div class="card-status"></div>
        </div>
      `;
      c.querySelector('.card-project').textContent = title;
      c.querySelector('.card-status').textContent = line;
      trackEl.appendChild(c);
      measureCards();
      return;
    }

    windows.forEach((w) => {
      const host = w.host || 'mac';
      const c = document.createElement('div');
      c.className = 'card';
      c.dataset.host = host;
      c.innerHTML = `
        <div class="host-badge" data-host="${host}">${host.toUpperCase()}</div>
        <div class="card-project">${w.project || w.title || 'Untitled'}</div>
        <div class="card-center">
          <div class="hold-ring"></div>
          <div class="card-status">Tap to talk</div>
          <div class="transcribe-bars" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <button class="record-cancel" type="button" aria-label="Cancel recording">X</button>
        <div class="meter"><div class="meter-fill"></div></div>
      `;
      trackEl.appendChild(c);
    });

    measureCards();
  }

  function updateActive() {
    const cards = trackEl.querySelectorAll('.card');
    cards.forEach((c, i) => {
      c.classList.toggle('active', i === selected);
    });
  }

  function measureCards() {
    const deckW = deckEl.clientWidth;
    if (deckW <= 0) return;
    cardWidth = Math.max(120, Math.round(deckW * 0.88) - 2 * CARD_MARGIN_PX);
    cardStep = cardWidth + 2 * CARD_MARGIN_PX;
    restOffset = (deckW - cardWidth) / 2 - CARD_MARGIN_PX;
    trackEl.querySelectorAll('.card').forEach((c) => {
      c.style.width = cardWidth + 'px';
    });
    layoutTrack();
  }

  function layoutTrack(dragDelta = 0) {
    const n = Math.max(1, windows.length);
    const idx = selected >= 0 ? selected : 0;
    const clamped = Math.max(0, Math.min(n - 1, idx));
    const x = restOffset - clamped * cardStep + dragDelta;
    trackEl.style.transform = `translate3d(${x}px, 0, 0)`;
  }

  function renderListenPanel() {
    updateActive();

    reviewBoxEl.classList.toggle('active', mode === 'editing' || mode === 'error');
    reviewBoxEl.classList.toggle('error', mode === 'error');
    sentPillEl.classList.toggle('show', sentToastVisible);

    const cards = trackEl.querySelectorAll('.card');
    cards.forEach((card) => {
      card.classList.remove('holding', 'waiting', 'sent');
      const status = card.querySelector('.card-status');
      const fill = card.querySelector('.meter-fill');
      if (status && !card.classList.contains('empty')) status.textContent = 'Tap to talk';
      if (fill) fill.style.width = '0%';
    });

    const active = activeCard();
    if (active && !active.classList.contains('empty')) {
      const status = active.querySelector('.card-status');
      if (mode === 'holding') {
        active.classList.add('holding');
        if (status) status.textContent = 'Tap to finish';
      } else if (mode === 'waiting') {
        active.classList.add('waiting');
        if (status) status.textContent = 'Transcribing...';
      } else if (mode === 'sent') {
        active.classList.add('sent');
      }
    }

    if (mode === 'editing') {
      reviewTextEl.readOnly = false;
      btnSubmitEl.hidden = false;
      if (reviewTextEl.value !== transcriptText && !reviewTextEl.dataset.touched) {
        reviewTextEl.value = transcriptText;
      }
      btnDeleteEl.textContent = 'Delete';
      btnSubmitEl.disabled = !reviewTextEl.value.trim();
      if (document.activeElement !== reviewTextEl) {
        setTimeout(() => {
          if (mode === 'editing') reviewTextEl.focus();
        }, 60);
      }
    } else if (mode === 'error') {
      reviewTextEl.value = errorText;
      reviewTextEl.readOnly = true;
      btnDeleteEl.textContent = 'Delete';
      btnSubmitEl.hidden = true;
      btnSubmitEl.disabled = true;
    } else {
      reviewTextEl.readOnly = false;
      btnDeleteEl.textContent = 'Delete';
      btnSubmitEl.hidden = false;
      btnSubmitEl.disabled = true;
    }
  }

  function jumpTo(index) {
    if (!windows.length) return;
    if (index < 0 || index >= windows.length || index === selected) return;
    if (mode === 'holding') return;
    if (mode === 'waiting' || mode === 'editing' || mode === 'error' || mode === 'sent') {
      setMode('idle');
    }
    selected = index;
    send({ type: 'select', index });
    renderListenPanel();
    layoutTrack();
    flashSwitchCard(index);
  }

  const SWIPE_PX = 12;
  const VERTICAL_CANCEL = 36;
  const SWIPE_DISTANCE_R = 0.30;
  const SWIPE_VELOCITY = 0.55;

  function onDeckPointerDown(e) {
    if (gesture) return;
    if (e.button !== undefined && e.button !== 0) return;
    if (!windows.length) return;
    if (!(mode === 'idle' || mode === 'holding')) return;

    try { deckEl.setPointerCapture(e.pointerId); } catch {}

    gesture = {
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      startT: performance.now(),
      lastX: e.clientX,
      lastT: performance.now(),
      committed: null,
      startedWhileHolding: mode === 'holding',
    };

  }

  function onDeckPointerMove(e) {
    if (!gesture || e.pointerId !== gesture.pointerId) return;
    const dx = e.clientX - gesture.startX;
    const dy = e.clientY - gesture.startY;
    gesture.lastX = e.clientX;
    gesture.lastT = performance.now();

    if (!gesture.committed) {
      if (Math.abs(dy) > VERTICAL_CANCEL && Math.abs(dy) > Math.abs(dx)) {
        abortDeckGesture();
        return;
      }
      if (Math.abs(dx) > SWIPE_PX) {
        if (gesture.startedWhileHolding) {
          gesture.committed = 'ignore';
          return;
        }
        gesture.committed = 'swipe';
        trackEl.classList.add('dragging');
      }
    }

    if (gesture.committed === 'swipe') {
      let delta = dx;
      const atStart = selected <= 0 && delta > 0;
      const atEnd = selected >= windows.length - 1 && delta < 0;
      if (atStart || atEnd) delta *= 0.35;
      layoutTrack(delta);
    }
  }

  async function onDeckPointerUp(e) {
    if (!gesture || e.pointerId !== gesture.pointerId) return;
    const g = gesture;
    gesture = null;
    trackEl.classList.remove('dragging');

    if (g.committed === 'swipe') {
      const dx = g.lastX - g.startX;
      const dt = Math.max(1, g.lastT - g.startT);
      const velocity = dx / dt;
      let target = selected;
      const pastDistance = Math.abs(dx) > cardStep * SWIPE_DISTANCE_R;
      const pastVelocity = Math.abs(velocity) > SWIPE_VELOCITY;
      if (pastDistance || pastVelocity) {
        target = selected + (dx < 0 ? 1 : -1);
      }
      target = Math.max(0, Math.min(windows.length - 1, target));
      if (target !== selected) {
        jumpTo(target);
        haptic(HAPTIC.SOFT);
      } else {
        layoutTrack();
      }
    } else if (g.startedWhileHolding && g.committed !== 'ignore') {
      await endHold('send');
    } else if (!g.startedWhileHolding && !g.committed) {
      await startHold();
    } else {
      layoutTrack();
    }
  }

  async function abortDeckGesture() {
    if (!gesture) return;
    gesture = null;
    trackEl.classList.remove('dragging');
    layoutTrack();
  }

  deckEl.addEventListener('pointerdown', onDeckPointerDown);
  deckEl.addEventListener('pointermove', onDeckPointerMove);
  deckEl.addEventListener('pointerup', onDeckPointerUp);
  deckEl.addEventListener('pointercancel', onDeckPointerUp);

  trackEl.addEventListener('pointerdown', async (e) => {
    const cancelBtn = e.target.closest('.record-cancel');
    if (!cancelBtn) return;
    e.preventDefault();
    e.stopPropagation();
    if (mode !== 'holding') return;
    await discardRecording();
    send({ type: 'cancel' });
    setMode('idle');
    haptic(HAPTIC.SOFT);
  });

  reviewTextEl.addEventListener('input', () => {
    reviewTextEl.dataset.touched = '1';
    btnSubmitEl.disabled = !reviewTextEl.value.trim();
  });

  reviewTextEl.addEventListener('contextmenu', (e) => {
    e.preventDefault();
  });

  reviewTextEl.addEventListener('select', () => {
    if (reviewTextEl.selectionStart !== reviewTextEl.selectionEnd) {
      const pos = reviewTextEl.selectionEnd;
      reviewTextEl.setSelectionRange(pos, pos);
    }
  });

  btnSubmitEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (mode !== 'editing') return;
    const text = reviewTextEl.value.trim();
    if (!text) return;
    send({ type: 'submit', text });
    setMode('idle');
    showSubmittedToast();
    haptic(HAPTIC.DONE);
  });

  btnDeleteEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (mode === 'error') {
      send({ type: 'cancel' });
      setMode('idle');
      haptic(HAPTIC.SOFT);
      return;
    }
    if (mode !== 'editing') return;
    if (reviewTextEl.value.length > 0) {
      reviewTextEl.value = '';
      transcriptText = '';
      delete reviewTextEl.dataset.touched;
      btnSubmitEl.disabled = true;
      reviewTextEl.focus();
      haptic(HAPTIC.SOFT);
      return;
    }
    send({ type: 'cancel' });
    setMode('idle');
    haptic(HAPTIC.SOFT);
  });

  function clearMacWaitTimer() {
    if (macWaitTimer) {
      clearTimeout(macWaitTimer);
      macWaitTimer = null;
    }
  }

  async function connect() {
    await prepareAccountRelayForConnect();
    sawMacState = false;
    clearMacWaitTimer();
    ws = new WebSocket(wsURL());
    ws.onopen = () => {
      reconnectDelay = 500;
      dot.className = connectionMode === 'remote' ? 'dot wait' : 'dot ok';
      if (connectionMode === 'remote') {
        statusText.textContent = 'Waiting for Mac…';
        clearMacWaitTimer();
        macWaitTimer = setTimeout(() => {
          if (!sawMacState) {
            dot.className = 'dot bad';
            statusText.textContent = 'Mac offline';
            haptic(HAPTIC.ERR);
            updateOnboardingChecklist();
          }
        }, 6000);
      } else {
        statusText.textContent = 'connected nearby';
        dot.className = 'dot ok';
      }
      if (connectionMode === 'remote') {
        /* wait for first state to confirm the Mac app is on the same account & relay. */
      }
      updateOnboardingChecklist();
      send({ type: 'request_state' });
      if (resyncTimer) clearInterval(resyncTimer);
      resyncTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          send({ type: 'request_state' });
        }
      }, 30000);
    };
    ws.onclose = () => {
      if (resyncTimer) {
        clearInterval(resyncTimer);
        resyncTimer = null;
      }
      dot.className = 'dot bad';
      clearMacWaitTimer();
      const remoteFail = connectionMode === 'remote';
      statusText.textContent = remoteFail ? 'Relay disconnected' : 'reconnecting';
      updateOnboardingChecklist();
      safeReset();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 5000);
    };
    ws.onerror = () => {};
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'state') {
          sawMacState = true;
          clearMacWaitTimer();
          const windowsChanged =
            JSON.stringify(msg.windows || []) !== JSON.stringify(windows);
          const nextMacAccessTrusted = !msg.accessibility || msg.accessibility.trusted !== false;
          const accessChanged = nextMacAccessTrusted !== macAccessTrusted;
          const nextLwe = msg.list_windows_error && String(msg.list_windows_error) || null;
          const lweChanged = nextLwe !== listWindowsError;
          listWindowsError = nextLwe;
          if (!nextMacAccessTrusted) {
            statusText.textContent = 'Needs Mac access';
            dot.className = 'dot bad';
          } else {
            const st = (statusText && statusText.textContent) || '';
            if (!st.toLowerCase().includes('reconnecting')) {
              if (connectionMode === 'remote') {
                statusText.textContent = 'connected remotely';
              } else {
                statusText.textContent = 'connected nearby';
              }
              dot.className = 'dot ok';
            }
          }
          if (connectionMode === 'remote') {
            updateOnboardingChecklist();
          }
          windows = msg.windows || [];
          macAccessTrusted = nextMacAccessTrusted;
          selected = typeof msg.selected === 'number' ? msg.selected : -1;
          normalizeSelection();
          const nextPeer = msg.peer || null;
          const hasPeer = !!(nextPeer && nextPeer.configured);
          document.body.setAttribute('data-has-peer', hasPeer ? '1' : '0');
          trackpadEl.setAttribute('data-peer', hasPeer ? 'on' : 'off');
          if (msg.cursor_host) setCursorHost(msg.cursor_host);
          if (windowsChanged || accessChanged || lweChanged || trackEl.children.length === 0) {
            buildCards();
          }
          renderListenPanel();
          updateOnboardingChecklist();
          if (!(gesture && gesture.committed === 'swipe')) {
            layoutTrack();
          }
        } else if (msg.type === 'cursor_host') {
          setCursorHost(msg.host);
        } else if (msg.type === 'final_transcript') {
          if (mode === 'waiting' || mode === 'holding') {
            transcriptText = (msg.text || '').trim();
            if (pendingTranscriptAction === 'send') {
              if (transcriptText) {
                send({ type: 'submit', text: transcriptText });
                setMode('idle');
                showSubmittedToast();
                haptic(HAPTIC.DONE);
              } else {
                setMode('idle');
                haptic(HAPTIC.SOFT);
              }
            } else {
              setMode('editing');
              haptic(HAPTIC.SOFT);
            }
          }
        } else if (msg.type === 'transcribe_error') {
          if (mode === 'waiting' || mode === 'holding') {
            transcriptText = '';
            errorText = msg.message || 'Transcription failed';
            setMode('error');
            haptic(HAPTIC.ERR);
          }
        } else if (msg.type === 'action_blocked') {
          haptic(HAPTIC.ERR);
          if (msg.reason === 'accessibility') {
            statusText.textContent = 'Needs Mac access';
            dot.className = 'dot bad';
            send({ type: 'request_state' });
          }
        }
      } catch {}
    };
  }

  let micStream = null;
  let micStreamPromise = null;
  let mediaRecorder = null;
  let recordedChunks = [];
  let audioCtx = null;
  let analyser = null;
  let meterAnimHandle = null;

  function pickMimeType() {
    const candidates = [
      'audio/mp4',
      'audio/mp4;codecs=mp4a.40.2',
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/ogg;codecs=opus',
    ];
    if (typeof MediaRecorder === 'undefined') return '';
    for (const c of candidates) {
      try {
        if (MediaRecorder.isTypeSupported(c)) return c;
      } catch {}
    }
    return '';
  }

  function ensureMicStream() {
    if (micStream) return Promise.resolve(micStream);
    if (micStreamPromise) return micStreamPromise;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      return Promise.reject(new Error('getUserMedia unavailable'));
    }
    micStreamPromise = navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      },
    }).then((stream) => {
      micStream = stream;
      micStreamPromise = null;
      return stream;
    }).catch((err) => {
      micStreamPromise = null;
      throw err;
    });
    return micStreamPromise;
  }

  function releaseMicStream() {
    if (micStream) {
      micStream.getTracks().forEach((track) => {
        try { track.stop(); } catch {}
      });
    }
    micStream = null;
    micStreamPromise = null;
    analyser = null;
    if (audioCtx) {
      const ctx = audioCtx;
      audioCtx = null;
      try { if (ctx.state !== 'closed') ctx.close().catch(() => {}); } catch {}
    }
  }

  function startMeter() {
    if (!micStream) return;
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch {
        return;
      }
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().catch(() => {});
    }
    if (!analyser) {
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.75;
      const src = audioCtx.createMediaStreamSource(micStream);
      src.connect(analyser);
    }
    const buf = new Uint8Array(analyser.frequencyBinCount);
    const tick = () => {
      if (mode !== 'holding') {
        meterAnimHandle = null;
        const fill = activeCard() && activeCard().querySelector('.meter-fill');
        if (fill) fill.style.width = '0%';
        return;
      }
      analyser.getByteTimeDomainData(buf);
      let peak = 0;
      for (let i = 0; i < buf.length; i++) {
        const v = Math.abs(buf[i] - 128);
        if (v > peak) peak = v;
      }
      const pct = Math.min(100, Math.max(4, (peak / 64) * 100));
      const fill = activeCard() && activeCard().querySelector('.meter-fill');
      if (fill) fill.style.width = pct + '%';
      meterAnimHandle = requestAnimationFrame(tick);
    };
    meterAnimHandle = requestAnimationFrame(tick);
  }

  function stopMeter() {
    if (meterAnimHandle) cancelAnimationFrame(meterAnimHandle);
    meterAnimHandle = null;
    trackEl.querySelectorAll('.meter-fill').forEach((fill) => {
      fill.style.width = '0%';
    });
  }

  async function startRecording() {
    try {
      await ensureMicStream();
      micPermissionOk = true;
      updateOnboardingChecklist();
    } catch (err) {
      console.warn('[mic] getUserMedia failed:', err);
      micPermissionOk = false;
      updateOnboardingChecklist();
      errorText =
        'Microphone permission denied. Allow mic access for this site and try again.';
      setMode('error');
      return false;
    }

    const mime = pickMimeType();
    recordedChunks = [];
    try {
      mediaRecorder = mime
        ? new MediaRecorder(micStream, { mimeType: mime })
        : new MediaRecorder(micStream);
    } catch (err) {
      console.warn('[mic] MediaRecorder init failed:', err);
      errorText = 'This browser does not support microphone recording.';
      releaseMicStream();
      setMode('error');
      return false;
    }

    mediaRecorder.addEventListener('dataavailable', (ev) => {
      if (ev.data && ev.data.size > 0) recordedChunks.push(ev.data);
    });

    mediaRecorder.start();
    startMeter();
    return true;
  }

  async function finishRecording() {
    if (!mediaRecorder) {
      releaseMicStream();
      return;
    }
    const mr = mediaRecorder;
    mediaRecorder = null;
    const done = new Promise((resolve) => {
      mr.addEventListener('stop', resolve, { once: true });
    });
    try { mr.stop(); } catch {}
    await done;
    stopMeter();
    releaseMicStream();

    const mime = (mr.mimeType && mr.mimeType.split(';')[0]) || 'audio/mp4';
    const blob = new Blob(recordedChunks, { type: mime });
    recordedChunks = [];
    if (blob.size === 0) return;

    try {
      const buf = await blob.arrayBuffer();
      sendBinary(buf);
    } catch (err) {
      console.warn('[mic] failed to ship audio blob:', err);
    }
  }

  async function discardRecording() {
    if (!mediaRecorder) {
      recordedChunks = [];
      stopMeter();
      releaseMicStream();
      return;
    }
    const mr = mediaRecorder;
    mediaRecorder = null;
    const done = new Promise((resolve) => {
      mr.addEventListener('stop', resolve, { once: true });
    });
    try { mr.stop(); } catch {}
    await done;
    recordedChunks = [];
    stopMeter();
    releaseMicStream();
  }

  async function startHold() {
    if (mode !== 'idle') return;
    if (!selectedWindow()) return;
    pendingTranscriptAction = 'send';
    setMode('holding');
    send({ type: 'hold_start' });
    const ok = await startRecording();
    if (!ok) {
      if (mode === 'holding') setMode('idle');
      return;
    }
    haptic(HAPTIC.MEDIUM);
  }

  async function endHold(action = 'edit') {
    if (mode !== 'holding') return;
    pendingTranscriptAction = action === 'send' ? 'send' : 'edit';
    setMode('waiting');
    haptic(HAPTIC.SOFT);
    await finishRecording();
    send({ type: 'hold_end' });
  }

  const PAD_BASE_SENSITIVITY = 1.55;
  const PAD_ACCEL_THRESHOLD = 0.8;
  const PAD_ACCEL_EXPONENT = 0.85;
  const PAD_ACCEL_COEFF = 9.0;
  const PAD_ACCEL_CAP = 3.4;
  const PAD_TAP_MAX_MS = 320;
  const PAD_TAP_MAX_PX = 8;
  const SCROLL_SENSITIVITY = 1.6;

  const padPointers = new Map();
  const padFrameDeltas = new Map();
  let padRemainderX = 0;
  let padRemainderY = 0;
  let padScrollRemainderX = 0;
  let padScrollRemainderY = 0;
  let padFrameScheduled = false;
  let padGestureMaxFingers = 0;
  let padGestureAnyMoved = false;
  let padGestureStartT = 0;

  function setCursorHost(host) {
    if (host !== 'mac' && host !== 'pc') return;
    if (padHostEl.dataset.host === host) return;
    padHostEl.dataset.host = host;
    padHostEl.textContent = host.toUpperCase();
    trackpadEl.classList.add('active');
    haptic(HAPTIC.SOFT);
    setTimeout(() => {
      if (padPointers.size === 0) trackpadEl.classList.remove('active');
    }, 260);
  }

  function padUpdateTouchIndicator(x, y) {
    const rect = trackpadEl.getBoundingClientRect();
    padTouchEl.style.setProperty('--touch-x', (x - rect.left) + 'px');
    padTouchEl.style.setProperty('--touch-y', (y - rect.top) + 'px');
  }

  function cancelPadGesture() {
    padPointers.clear();
    padFrameDeltas.clear();
    padGestureMaxFingers = 0;
    padGestureAnyMoved = false;
    padRemainderX = padRemainderY = 0;
    padScrollRemainderX = padScrollRemainderY = 0;
    padTouchEl.classList.remove('show');
    trackpadEl.classList.remove('active');
  }

  function schedulePadFrame() {
    if (padFrameScheduled) return;
    padFrameScheduled = true;
    requestAnimationFrame(flushPadFrame);
  }

  function flushPadFrame() {
    padFrameScheduled = false;
    if (padFrameDeltas.size === 0) return;

    const activeCount = padPointers.size;
    const movingIds = [...padFrameDeltas.keys()];

    if (activeCount <= 1 && movingIds.length >= 1) {
      let dx = 0, dy = 0;
      for (const id of movingIds) {
        const d = padFrameDeltas.get(id);
        dx += d.dx;
        dy += d.dy;
      }
      emitPadMove(dx, dy);
    } else if (activeCount >= 2) {
      let dx = 0, dy = 0;
      for (const id of movingIds) {
        const d = padFrameDeltas.get(id);
        dx += d.dx;
        dy += d.dy;
      }
      dx /= movingIds.length;
      dy /= movingIds.length;
      emitPadScroll(dx, dy);
    }

    padFrameDeltas.clear();
  }

  function padAccelFactor(magPxPerFrame) {
    const speed = magPxPerFrame / (1000 / 60);
    if (speed <= PAD_ACCEL_THRESHOLD) return 1.0;
    const over = speed - PAD_ACCEL_THRESHOLD;
    const boost = Math.pow(over * PAD_ACCEL_COEFF, PAD_ACCEL_EXPONENT);
    return Math.min(PAD_ACCEL_CAP, 1.0 + boost * 0.12);
  }

  function emitPadMove(rawDx, rawDy) {
    const mag = Math.hypot(rawDx, rawDy);
    const accel = padAccelFactor(mag);
    const sx = rawDx * PAD_BASE_SENSITIVITY * accel + padRemainderX;
    const sy = rawDy * PAD_BASE_SENSITIVITY * accel + padRemainderY;
    const ix = Math.trunc(sx);
    const iy = Math.trunc(sy);
    padRemainderX = sx - ix;
    padRemainderY = sy - iy;
    if (ix !== 0 || iy !== 0) send({ type: 'mouse_move', dx: ix, dy: iy });
  }

  function emitPadScroll(rawDx, rawDy) {
    const sx = rawDx * SCROLL_SENSITIVITY + padScrollRemainderX;
    const sy = rawDy * SCROLL_SENSITIVITY + padScrollRemainderY;
    const ix = Math.trunc(sx);
    const iy = Math.trunc(sy);
    padScrollRemainderX = sx - ix;
    padScrollRemainderY = sy - iy;
    if (ix !== 0 || iy !== 0) send({ type: 'mouse_scroll', dx: ix, dy: iy });
  }

  trackpadEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    try { trackpadEl.setPointerCapture(e.pointerId); } catch {}

    const now = performance.now();
    if (padPointers.size === 0) {
      padGestureMaxFingers = 1;
      padGestureAnyMoved = false;
      padGestureStartT = now;
      padRemainderX = padRemainderY = 0;
      padScrollRemainderX = padScrollRemainderY = 0;
    } else {
      padGestureMaxFingers = Math.max(padGestureMaxFingers, padPointers.size + 1);
    }

    padPointers.set(e.pointerId, {
      startX: e.clientX, startY: e.clientY, startT: now,
      lastX: e.clientX, lastY: e.clientY, lastT: now,
      moved: false,
    });

    if (padPointers.size === 1) {
      padUpdateTouchIndicator(e.clientX, e.clientY);
      padTouchEl.classList.add('show');
      trackpadEl.classList.add('active');
    } else {
      padTouchEl.classList.remove('show');
    }
  });

  trackpadEl.addEventListener('pointermove', (e) => {
    const p = padPointers.get(e.pointerId);
    if (!p) return;

    const coalesced =
      typeof e.getCoalescedEvents === 'function'
        ? e.getCoalescedEvents()
        : [];
    const samples = coalesced.length ? coalesced : [e];

    let dxTotal = 0;
    let dyTotal = 0;
    for (const s of samples) {
      dxTotal += s.clientX - p.lastX;
      dyTotal += s.clientY - p.lastY;
      p.lastX = s.clientX;
      p.lastY = s.clientY;
    }
    p.lastT = performance.now();

    const totalDx = e.clientX - p.startX;
    const totalDy = e.clientY - p.startY;
    if (Math.abs(totalDx) > PAD_TAP_MAX_PX || Math.abs(totalDy) > PAD_TAP_MAX_PX) {
      p.moved = true;
      padGestureAnyMoved = true;
    }

    let acc = padFrameDeltas.get(e.pointerId);
    if (!acc) {
      acc = { dx: 0, dy: 0 };
      padFrameDeltas.set(e.pointerId, acc);
    }
    acc.dx += dxTotal;
    acc.dy += dyTotal;
    schedulePadFrame();

    if (padPointers.size === 1) {
      padUpdateTouchIndicator(e.clientX, e.clientY);
    }
  });

  function padOnPointerUp(e) {
    const p = padPointers.get(e.pointerId);
    if (!p) return;
    padPointers.delete(e.pointerId);

    if (padFrameScheduled || padFrameDeltas.size) {
      flushPadFrame();
    }

    if (padPointers.size === 0) {
      const gestureDur = performance.now() - padGestureStartT;
      const wasTap = !padGestureAnyMoved && gestureDur < PAD_TAP_MAX_MS;

      if (wasTap) {
        if (padGestureMaxFingers >= 2) {
          send({ type: 'mouse_click', button: 'right' });
        } else {
          send({ type: 'mouse_click', button: 'left' });
        }
        haptic(HAPTIC.TAP);
      }

      padGestureMaxFingers = 0;
      padGestureAnyMoved = false;
      padFrameDeltas.clear();
      padTouchEl.classList.remove('show');
      trackpadEl.classList.remove('active');
    }
  }

  trackpadEl.addEventListener('pointerup', padOnPointerUp);
  trackpadEl.addEventListener('pointercancel', padOnPointerUp);

  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('gesturechange', (e) => e.preventDefault());
  document.addEventListener('dblclick', (e) => e.preventDefault());
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  window.addEventListener('resize', measureCards);
  window.addEventListener('orientationchange', () => {
    requestAnimationFrame(() => requestAnimationFrame(measureCards));
  });

  buildCards();
  renderListenPanel();
  initializeAccountRelay().then((ready) => {
    if (ready) connect();
  });
})();
</script>
</body>
</html>
